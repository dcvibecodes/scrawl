<!DOCTYPE html>
<html>
<head>
    <title>Generate Scrawl Icons</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { font-size: 1.2rem; }
        .preview { display: flex; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
        .preview img { border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px 24px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        button:hover { opacity: 0.8; }
        .status { margin-top: 15px; color: #666; }
    </style>
</head>
<body>
    <h1>Scrawl Icon Generator</h1>
    <p>Click the button to generate and download all required PNG icons from the SVG source.</p>
    
    <div class="preview">
        <div><img src="icon.svg" width="64" height="64"><br><small>icon.svg</small></div>
    </div>

    <button onclick="generateAll()">Generate & Download All Icons</button>
    <div class="status" id="status"></div>

    <script>
        const sizes = [
            { name: 'icon-512.png', size: 512 },
            { name: 'icon-192.png', size: 192 },
            { name: 'apple-touch-icon.png', size: 180 },
            { name: 'favicon-32.png', size: 32 },
            { name: 'favicon-16.png', size: 16 }
        ];

        function renderSvgToPng(svgUrl, size) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);
                    canvas.toBlob(resolve, 'image/png');
                };
                img.onerror = reject;
                img.src = svgUrl;
            });
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function generateAll() {
            const status = document.getElementById('status');
            status.textContent = 'Generating...';

            for (const { name, size } of sizes) {
                try {
                    const blob = await renderSvgToPng('icon.svg', size);
                    downloadBlob(blob, name);
                    status.textContent = `Downloaded ${name}...`;
                    await new Promise(r => setTimeout(r, 500));
                } catch (e) {
                    status.textContent = `Error generating ${name}: ${e.message}`;
                    return;
                }
            }

            status.textContent = 'All icons downloaded. Move them into the public/ folder.';
        }
    </script>
</body>
</html>
